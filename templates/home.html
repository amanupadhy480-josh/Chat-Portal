<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        .header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:10; }
        
        .profile-section { background: #128c7e; color: white; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .profile-dp { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid white; cursor: pointer; }
        
        .search-container { background: white; padding: 10px 15px; border-bottom: 1px solid #ddd; }
        .search-box { width: 100%; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; background: #f0f2f5; }

        .section-title { padding: 10px 15px; font-size: 12px; color: #666; text-transform: uppercase; font-weight: bold; }
        .user-item { background: white; padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; transition: 0.2s; }
        .user-item:active { background: #ebebeb; }
        .item-dp { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; }
        .user-info { flex: 1; text-decoration: none; color: black; }
        
        .action-btn { padding: 6px 12px; border-radius: 4px; border: none; font-size: 12px; cursor: pointer; font-weight: bold; }
        .btn-accept { background: #25D366; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <strong>Aman Portal</strong>
        <a href="/logout" style="color:white; text-decoration:none;"><i class="bi bi-power"></i></a>
    </div>

    <div class="profile-section">
        <form id="dp-form" action="/update_dp" method="POST" enctype="multipart/form-data">
            <input type="file" id="dp-input" name="file" style="display:none" onchange="document.getElementById('dp-form').submit()">
            <img src="/uploads/{{ current_user.profile_pic }}" class="profile-dp" onclick="document.getElementById('dp-input').click()" title="Click to change DP">
        </form>
        <div>
            <div style="font-weight:bold; font-size:18px;">{{ current_user.username }}</div>
            <small>+91 {{ current_user.mobile }}</small>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search contacts..." onkeyup="filterContacts()">
    </div>

    <div class="section-title">My Contacts</div>
    <div id="contactList">
        {% for c in contacts %}
        <div class="user-item">
            <img src="/uploads/{{ c.dp }}" class="item-dp">
            <a href="/chat/{{ c.username }}" class="user-info">
                <strong>{{ c.username }}</strong><br>
                <small>+91 {{ c.mobile }}</small>
            </a>
            <a href="/delete_contact/{{ c.id }}" style="color:#aaa;" onclick="return confirm('Remove?')"><i class="bi bi-trash"></i></a>
        </div>
        {% endfor %}
    </div>

    {% if unknown %}
    <div class="section-title">Requests</div>
    {% for u in unknown %}
    <div class="user-item">
        <img src="/uploads/{{ u.dp }}" class="item-dp">
        <div class="user-info">
            <strong>{{ u.username }}</strong><br>
            <small>New Message</small>
        </div>
        <form action="/add_contact" method="POST">
            <input type="hidden" name="mobile" value="{{ u.mobile }}">
            <button type="submit" class="action-btn btn-accept">Accept</button>
        </form>
    </div>
    {% endfor %}
    {% endif %}

    <script>
        function filterContacts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let items = document.getElementById('contactList').getElementsByClassName('user-item');
            for (let item of items) {
                let name = item.innerText.toLowerCase();
                item.style.display = name.includes(input) ? "flex" : "none";
            }
        }
    </script>
</body>
    </html>
