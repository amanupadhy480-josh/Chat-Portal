<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --bg: #e5ddd5; --header: #075e54; --sent: #dcf8c6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--header); color: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
        .theme-btn { background: none; border: 1px solid white; color: white; border-radius: 50%; cursor: pointer; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px; margin: 5px 0; border-radius: 8px; max-width: 80%; position: relative; font-size: 15px; }
        .sent { background: var(--sent); align-self: flex-end; }
        .received { background: white; align-self: flex-start; }
        .time { font-size: 9px; color: #888; display: block; text-align: right; margin-top: 3px; }

        #form { display: flex; padding: 10px; background: #f0f0f0; }
        #input { flex: 1; border-radius: 20px; border: 1px solid #ddd; padding: 10px 15px; outline: none; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center;">
            <a href="/" style="color:white; text-decoration:none; font-size:24px; margin-right:15px;">‹</a>
            <div>
                <strong>{{ recipient }}</strong><br>
                <small style="font-size:10px;">+91 {{ recipient_mobile }}</small>
            </div>
        </div>
        <button class="theme-btn" onclick="toggleThemes()">🎨</button>
    </div>

    <ul id="messages">
        {% for msg in saved_messages %}
            <li class="msg {% if msg.sender == current_user.username %}sent{% else %}received{% endif %}">
                {{ msg.content }}
                <span class="time">{{ msg.timestamp.strftime('%I:%M %p') }}</span>
            </li>
        {% endfor %}
    </ul>

    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." required>
        <button type="submit" style="background:var(--header); color:white; border:none; border-radius:50%; width:40px; height:40px; margin-left:5px;">➤</button>
    </form>

    <script>
        var socket = io();
        var recipient = "{{ recipient }}";
        var me = "{{ current_user.username }}";

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if(input.value.trim() != "") {
                socket.emit('private_message', { message: input.value, recipient: recipient });
                input.value = '';
            }
        });

        socket.on('new_msg', function(data) {
            if((data.sender === me && data.recipient === recipient) || (data.sender === recipient && data.recipient === me)) {
                var item = document.createElement('li');
                item.className = 'msg ' + (data.sender === me ? 'sent' : 'received');
                item.innerHTML = data.msg + '<span class="time">' + getTime() + '</span>';
                document.getElementById('messages').appendChild(item);
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function toggleThemes() {
            var colors = [
                {bg: '#e5ddd5', head: '#075e54', sent: '#dcf8c6'},
                {bg: '#121212', head: '#1f1f1f', sent: '#333'},
                {bg: '#fff', head: '#124076', sent: '#AAC4FF'}
            ];
            var current = JSON.parse(localStorage.getItem('theme-index') || '0');
            var next = (current + 1) % colors.length;
            setTheme(colors[next].bg, colors[next].head, colors[next].sent);
            localStorage.setItem('theme-index', next);
        }

        function setTheme(bg, head, sent) {
            document.documentElement.style.setProperty('--bg', bg);
            document.documentElement.style.setProperty('--header', head);
            document.documentElement.style.setProperty('--sent', sent);
        }
    </script>
</body>
</html>
