<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chat Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header Style */
        .header { background: #075e54; color: white; padding: 15px; font-size: 18px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 15px; list-style-type: none; display: flex; flex-direction: column; margin-bottom: 60px; }
        
        /* Message Bubbles */
        .msg { padding: 8px 12px; margin: 5px 0; border-radius: 10px; max-width: 75%; word-wrap: break-word; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .received { background: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .sent { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Input Form */
        #form { position: fixed; bottom: 0; width: 100%; display: flex; padding: 10px; background: #f0f0f0; box-sizing: border-box; }
        #input { flex: 1; border: none; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 50px; margin-left: 8px; cursor: pointer; font-weight: bold; }
        button:active { background: #128c7e; }
    </style>
</head>
<body>

    <div class="header">Chat Portal Live</div>

    <ul id="messages">
        {% if saved_messages %}
            {% for msg in saved_messages %}
                <li class="msg received">{{ msg.content }}</li>
            {% endfor %}
        {% endif %}
    </ul>

    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." /><button type="submit">Send</button>
    </form>

    <script>
        // Server se connect karna
        var socket = io();
        var form = document.getElementById('form');
        var input = document.getElementById('input');
        var messages = document.getElementById('messages');

        // Automatic scroll niche le jane ke liye
        function scrollToBottom() {
            messages.scrollTop = messages.scrollHeight;
        }
        scrollToBottom();

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                socket.send(input.value); // Server ko message bhejna
                input.value = '';
            }
        });

        // Naya message aane par screen par dikhana
        socket.on('message', function(msg) {
            var item = document.createElement('li');
            item.textContent = msg;
            item.classList.add('msg', 'sent'); // Filhal sabko 'sent' style de rahe hain testing ke liye
            messages.appendChild(item);
            scrollToBottom();
        });
    </script>
</body>
</html>
