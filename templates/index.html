<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --bg: #e5ddd5; --header: #075e54; --sent: #dcf8c6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); background-size: cover; height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--header); color: white; padding: 8px 15px; display: flex; align-items: center; gap: 10px; }
        .header-dp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; list-style: none; margin: 0; }
        .msg { padding: 8px 12px; margin: 5px 0; border-radius: 8px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: var(--sent); align-self: flex-end; }
        .received { background: white; align-self: flex-start; }
        .time { font-size: 9px; color: #888; display: block; text-align: right; margin-top: 3px; }

        #form { display: flex; padding: 10px; background: #f0f0f0; gap: 5px; }
        #input { flex: 1; border-radius: 20px; border: 1px solid #ddd; padding: 10px 15px; outline: none; }
        .send-btn { background: var(--header); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="color:white; text-decoration:none; font-size:24px;">‹</a>
        <img src="/uploads/{{ recipient_dp }}" class="header-dp">
        <div style="flex:1">
            <strong>{{ recipient }}</strong><br>
            <small style="font-size:10px;">+91 {{ recipient_mobile }}</small>
        </div>
    </div>

    <ul id="messages">
        {% for msg in saved_messages %}
            <li class="msg {% if msg.sender == current_user.username %}sent{% else %}received{% endif %}">
                {{ msg.content }}
                <span class="time">{{ msg.timestamp.strftime('%I:%M %p') }}</span>
            </li>
        {% endfor %}
    </ul>

    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." required>
        <button type="submit" class="send-btn">➤</button>
    </form>

    <script>
        var socket = io();
        var recipient = "{{ recipient }}";
        var me = "{{ current_user.username }}";

        // Restore Theme/BG
        window.onload = function() {
            let savedBg = localStorage.getItem('chat-bg-image');
            if(savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
            let theme = JSON.parse(localStorage.getItem('chat-theme'));
            if(theme) setTheme(theme.bg, theme.header, theme.sent);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function setTheme(bg, header, sent) {
            document.documentElement.style.setProperty('--bg', bg);
            document.documentElement.style.setProperty('--header', header);
            document.documentElement.style.setProperty('--sent', sent);
        }

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if(input.value.trim() != "") {
                socket.emit('private_message', { message: input.value, recipient: recipient });
                input.value = '';
            }
        });

        socket.on('new_msg', function(data) {
            if((data.sender === me && data.recipient === recipient) || (data.sender === recipient && data.recipient === me)) {
                var item = document.createElement('li');
                item.className = 'msg ' + (data.sender === me ? 'sent' : 'received');
                item.innerHTML = data.msg + '<span class="time">' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + '</span>';
                document.getElementById('messages').appendChild(item);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        });
    </script>
</body>
</html>
