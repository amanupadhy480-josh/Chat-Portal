<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Portal Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --main-bg: #e5ddd5; --header-bg: #075e54; --sent-bg: #dcf8c6; }
        body { font-family: sans-serif; margin: 0; background: var(--main-bg); display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--header-bg); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; list-style: none; }
        .msg { padding: 8px 12px; margin: 5px 0; border-radius: 10px; max-width: 75%; position: relative; }
        .sender-name { font-size: 10px; font-weight: bold; display: block; margin-bottom: 3px; }
        .received { background: white; align-self: flex-start; }
        .sent { background: var(--sent-bg); align-self: flex-end; }
        #form { display: flex; padding: 10px; background: #f0f0f0; }
        #input { flex: 1; border-radius: 20px; border: 1px solid #ccc; padding: 10px; outline: none; }
        .theme-panel { padding: 5px; background: #eee; display: flex; gap: 10px; justify-content: center; }
        .dot { height: 20px; width: 20px; border-radius: 50%; cursor: pointer; border: 1px solid #000; }
    </style>
</head>
<body>
    <div class="header">
        <span>Chat: {{ current_user.username }}</span>
        <a href="/login" style="color: white; font-size: 12px;">Logout</a>
    </div>

    <div class="theme-panel">
        <span>Theme:</span>
        <div class="dot" style="background: #075e54;" onclick="changeTheme('#075e54', '#dcf8c6')"></div>
        <div class="dot" style="background: #124076;" onclick="changeTheme('#124076', '#AAC4FF')"></div>
        <div class="dot" style="background: #7D0A0A;" onclick="changeTheme('#7D0A0A', '#EAD196')"></div>
    </div>

    <ul id="messages">
        {% for msg in saved_messages %}
            <li class="msg {% if msg.sender == current_user.username %}sent{% else %}received{% endif %}">
                <span class="sender-name">{{ msg.sender }}</span>
                {{ msg.content }}
            </li>
        {% endfor %}
    </ul>

    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." /><button style="border-radius: 50%; margin-left: 5px;">></button>
    </form>

    <script>
        var socket = io();
        var current_user = "{{ current_user.username }}";

        function changeTheme(header, bubble) {
            document.documentElement.style.setProperty('--header-bg', header);
            document.documentElement.style.setProperty('--sent-bg', bubble);
            localStorage.setItem('theme-header', header);
            localStorage.setItem('theme-bubble', bubble);
        }

        // Load saved theme
        if(localStorage.getItem('theme-header')) {
            changeTheme(localStorage.getItem('theme-header'), localStorage.getItem('theme-bubble'));
        }

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if (input.value) {
                socket.send(input.value);
                input.value = '';
            }
        });

        socket.on('message', function(data) {
            var item = document.createElement('li');
            item.classList.add('msg');
            item.innerHTML = `<span class="sender-name">${data.user}</span> ${data.msg}`;
            
            if(data.user === current_user) {
                item.classList.add('sent');
            } else {
                item.classList.add('received');
            }
            
            document.getElementById('messages').appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</body>
</html>
