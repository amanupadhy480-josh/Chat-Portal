<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ r_name }}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --wa-green: #075e54; --wa-light: #dcf8c6; --bg-chat: #e5ddd5; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-chat); height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: var(--wa-green); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
        .header a { color: white; text-decoration: none; font-size: 20px; }
        .header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }
        
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .m { padding: 8px 12px; border-radius: 10px; max-width: 75%; position: relative; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: var(--wa-light); border-top-right-radius: 2px; }
        .recv { align-self: flex-start; background: white; border-top-left-radius: 2px; }
        
        .msg-info { font-size: 10px; color: #888; text-align: right; margin-top: 4px; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .tick { color: #34b7f1; font-weight: bold; }
        
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #i { flex: 1; border: none; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 15px; }
        .send-btn { background: none; border: none; color: var(--wa-green); font-size: 25px; cursor: pointer; padding: 0 5px; }
        
        .attachment-link { color: #075e54; text-decoration: none; font-weight: bold; display: block; padding: 5px 0; }
    </style>
</head>
<body>

    <div class="header">
        <a href="/"><i class="bi bi-chevron-left"></i></a>
        <img src="/static/uploads/default_dp.png" alt="dp">
        <div style="flex: 1;">
            <strong>{{ r_name }}</strong><br>
            <small style="font-size: 10px; opacity: 0.8;">Online</small>
        </div>
        <i class="bi bi-telephone-fill"></i>
    </div>

    <div id="msgs">
        {% for m in messages %}
        <div class="m {% if m.sender == current_user.mobile %}sent{% else %}recv{% endif %}">
            {% if m.file_path %}
                <a href="/static/uploads/{{ m.file_path }}" class="attachment-link" target="_blank">
                    <i class="bi bi-file-earmark-arrow-down"></i> Attachment
                </a>
            {% else %}
                {{ m.content }}
            {% endif %}
            
            <div class="msg-info">
                {{ m.timestamp.strftime('%H:%M') }} 
                {% if m.sender == current_user.mobile %}
                    <span class="tick">✓✓</span>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="input-area">
        <i class="bi bi-paperclip" style="font-size: 22px; cursor: pointer; color: #555;" onclick="document.getElementById('file-up').click()"></i>
        <input id="i" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="send()">
            <i class="bi bi-send-fill"></i>
        </button>
    </div>

    <form id="file-form" action="/send_file" method="POST" enctype="multipart/form-data" style="display:none;">
        <input type="file" name="file" id="file-up" onchange="this.form.submit()">
        <input type="hidden" name="r_mobile" value="{{ r_mobile }}">
    </form>

    <script>
        var socket = io();
        var me = "{{ current_user.mobile }}";
        var target = "{{ r_mobile }}";

        // Scroll to bottom on load
        var msgDiv = document.getElementById('msgs');
        msgDiv.scrollTop = msgDiv.scrollHeight;

        function send() {
            let input = document.getElementById('i');
            if(input.value.trim() !== "") {
                socket.emit('private_message', {
                    message: input.value, 
                    recipient: target, 
                    sender: me
                });
                input.value = '';
            }
        }

        // Enter key to send
        document.getElementById('i').addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                send();
            }
        });

        socket.on('new_msg', (data) => {
            // Check if msg belongs to this chat
            if((data.sender == me && data.recipient == target) || (data.sender == target && data.recipient == me)) {
                // Reload to sync with DB and show ticks/files correctly
                location.reload(); 
            }
        });
    </script>

</body>
</html>
