<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #075e54; color: white; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 8px 12px; border-radius: 8px; max-width: 75%; font-size: 15px; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .recv { background: white; align-self: flex-start; }
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="color:white; text-decoration:none;">←</a>
        <img src="/uploads/{{ recipient.profile_pic }}" style="width:40px; height:40px; border-radius:50%;">
        <div>
            <strong>{{ recipient.username }}</strong><br>
            <small id="status">{% if recipient.is_online %}Online{% else %}Offline{% endif %}</small>
        </div>
        <i class="bi bi-telephone-fill" style="margin-left:auto;"></i>
    </div>

    <div id="msgs">
        {% for m in messages %}
        <div class="m {% if m.sender == current_user.username %}sent{% else %}recv{% endif %}">
            {{ m.content }}
        </div>
        {% endfor %}
    </div>

    <form class="input-area" id="f">
        <i class="bi bi-paperclip" onclick="alert('File sharing logic uses send_file route')"></i>
        <input id="i" placeholder="Type a message..." autocomplete="off">
        <button type="submit" style="border:none; background:none; color:#075e54; font-size:20px;">➤</button>
    </form>

    <script>
        var socket = io();
        var recipient = "{{ recipient.username }}";
        
        document.getElementById('f').onsubmit = (e) => {
            e.preventDefault();
            let i = document.getElementById('i');
            if(i.value) {
                socket.emit('private_message', { message: i.value, recipient: recipient });
                i.value = '';
            }
        };

        socket.on('new_msg', (data) => {
            let div = document.createElement('div');
            div.className = `m ${data.sender === "{{ current_user.username }}" ? 'sent' : 'recv'}`;
            div.innerText = data.msg;
            document.getElementById('msgs').appendChild(div);
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        });
    </script>
</body>
</html>
