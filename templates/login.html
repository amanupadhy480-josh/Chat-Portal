<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #075e54; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 40px 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #128c7e; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 style="color: #075e54; text-align: center; margin-bottom: 30px;">Welcome Back</h2>
            <form method="POST">
                <input name="mobile" placeholder="Mobile Number" required>
                <input name="password" type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">New user? <a href="/signup" style="color: #075e54; font-weight: bold;">Signup</a></p>
        </div>
    </div>
</body>
</html>
