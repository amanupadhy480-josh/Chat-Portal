<body style="font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <form method="POST" style="background: white; padding: 30px; border-radius: 10px; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="color: #075e54; margin-top: 0;">Login</h2>
        <input name="mobile" placeholder="Mobile Number" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px;" required><br>
        <input name="password" type="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px;" required><br>
        <button type="submit" style="width: 104%; padding: 10px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer;">Login</button>
        <p style="font-size: 12px; text-align: center;">New? <a href="/signup">Create Account</a></p>
    </form>
</body>
