<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #075e54; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #128c7e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .flash { color: red; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center; color: #075e54;">Login</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<p class="flash">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
        <form method="POST">
            <input name="mobile" placeholder="Mobile Number" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p style="text-align: center;">New? <a href="/signup">Create Account</a></p>
    </div>
</body>
</html>
