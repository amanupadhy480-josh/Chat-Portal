<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Aman Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --wa-green: #075e54; 
            --wa-light-green: #25d366; 
            --bg-gray: #f0f2f5; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .signup-container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
        }

        .signup-container h2 { 
            color: var(--wa-green); 
            margin-bottom: 20px; 
        }

        .input-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }

        .input-group label { 
            display: block; 
            margin-bottom: 5px; 
            font-size: 14px; 
            color: #555; 
        }

        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 15px;
        }

        .input-group input:focus { 
            border-color: var(--wa-light-green); 
        }

        .signup-btn { 
            background-color: var(--wa-green); 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
        }

        .signup-btn:hover { 
            background-color: #054c44; 
        }

        .footer-link { 
            margin-top: 20px; 
            font-size: 14px; 
        }

        .footer-link a { 
            color: var(--wa-green); 
            text-decoration: none; 
            font-weight: bold; 
        }

        /* Error message style */
        .flash-msg {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h2>Create Account</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/signup" method="POST">
            <div class="input-group">
                <label><i class="bi bi-person-fill"></i> Full Name</label>
                <input type="text" name="username" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label><i class="bi bi-phone-fill"></i> Mobile Number</label>
                <input type="text" name="mobile" placeholder="e.g. 9304008839" required>
            </div>

            <div class="input-group">
                <label><i class="bi bi-lock-fill"></i> Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>

</body>
</html>
